- title: Inspect AI
  tagline: Framework for systematic evaluation of large language models, built by the UK AISI in collaboration with Meridian. 
  description: Framework for systematic evaluation of large language models, built by the UK AISI in collaboration with Meridian. Inspect can be used for a broad range of evaluations that measure coding, agentic tasks, reasoning, knowledge, behavior, and multi-modal understanding. 
  icon: cpu
  featured: true
  href: https://inspect.aisi.org.uk
  secondary-links:
    - text: PyPI
      icon: boxes
      href: https://pypi.org/project/inspect-ai/
    - text: GitHub
      icon: github
      href: https://github.com/UKGovernmentBEIS/inspect_ai

- title: Inspect Scout
  tagline: In-depth analysis of AI agent transcripts with rich visualization of results and high-performance parallel scanning. 
  description: In-depth analysis of AI agent transcripts with rich visualization of results and high-performance parallel scanning. Detect issues like misconfigured environments, refusals, and evaluation awareness using LLM-based or pattern-based scanners.
  icon: search
  featured: true
  href: https://meridianlabs-ai.github.io/inspect_scout/
  secondary-links:
    - text: PyPI
      icon: boxes
      href: https://pypi.org/project/inspect-scout/
    - text: GitHub
      icon: github
      href: https://github.com/meridianlabs-ai/inspect_scout

- title: Inspect Petri
  tagline: Automated multi-turn agent for alignment auditing of language models. Built in collaboration with the UK AISI.
  description: Alignment auditing agent for probing language model behavior, built in collaboration with UK AISI. Rapidly test concrete alignment hypotheses end-to-end by generating realistic audit scenarios and orchestrating multi-turn audits.
  icon: shield-check
  featured: true
  href: https://meridianlabs-ai.github.io/inspect_petri/
  secondary-links:
    - text: PyPI
      icon: boxes
      href: https://pypi.org/project/inspect-petri/
    - text: GitHub
      icon: github
      href: https://github.com/meridianlabs-ai/inspect_petri
   

- title: Petri Bloom
  tagline: Framework for generating behavioral evaluations of frontier AI models.
  description: Framework for generating behavioral evaluations of frontier AI models. Given a “seed” configuration describing the target behavior and evaluation parameters, Bloom produces diverse test scenarios, runs conversations with the target model, and scores the results.
  icon: shield-check
  href: https://meridianlabs-ai.github.io/petri_bloom/
  secondary-links:
    - text: PyPI
      icon: boxes
      href: https://pypi.org/project/petri-bloom/
    - text: GitHub
      icon: github
      href: https://github.com/meridianlabs-ai/petri_bloom
   

